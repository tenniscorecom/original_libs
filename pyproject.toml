[project]
name = "comken"
version = "0.1.0"
description = "業務自動化共通ライブラリ"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openpyxl>=3.1",
    "selenium>=4.0",
    "simple-salesforce>=1.12",
    "requests>=2.28",
]

[project.optional-dependencies]
# Windows 専用機能（ExcelComHandler / WindowHandler / RegistryHandler）を使う場合
windows = ["pywin32"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["comken*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
